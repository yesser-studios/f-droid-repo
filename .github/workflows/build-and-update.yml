name: Build and Update F-Droid Repo

on:
  push:
    paths:
      - "metadata/**.yml"
      - ".github/workflows/*.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - run: rm ./repo/.gitignore

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/*.gradle.kts') }}
          restore-keys: gradle-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: ~/.android
          key: android-sdk-${{ runner.os }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install fdroidserver
        run: |
          uv tool install fdroidserver --with androguard
          curl https://gitlab.com/yesseruser/gradlew-fdroid/-/raw/main/gradlew.py > "$("$(uv tool dir)/fdroidserver/bin/python" -c "import site; print(site.getsitepackages()[0])")/gradlew-fdroid"
          chmod +x "$("$(uv tool dir)/fdroidserver/bin/python" -c "import site; print(site.getsitepackages()[0])")/gradlew-fdroid"

      - name: Restore keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Write config.yml
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: envsubst < config.yml.template > config.yml

      - name: Restore existing repo
        run: |
          if [ -d gh-pages/fdroid/repo ]; then
            cp -r gh-pages/fdroid/repo/* repo/ 2>/dev/null || true
          fi
          rm -rf gh-pages

      - name: Build APKs
        run: fdroid build -v --all

      - name: Publish (sign APKs)
        run: fdroid publish -v

      - name: Update index
        run: fdroid update --create-metadata -v

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          destination_dir: fdroid
