name: Build and Update F-Droid Repo

on:
  push:
    paths:
      - 'fdroid/metadata/**.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install fdroidserver
        run: |
          pip install fdroidserver --break-system-packages

      - name: Restore keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > fdroid/keystore.jks

      - name: Write config.yml
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: envsubst < fdroid/config.yml.template > fdroid/config.yml

      - name: Build APKs
        working-directory: fdroid
        run: fdroid build -v --all

      - name: Publish (sign APKs)
        working-directory: fdroid
        run: fdroid publish -v

      - name: Update index
        working-directory: fdroid
        run: fdroid update --create-metadata -v

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fdroid/repo/
          git diff --cached --quiet || git commit -m "Build and update F-Droid index"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./fdroid
          destination_dir: fdroid
